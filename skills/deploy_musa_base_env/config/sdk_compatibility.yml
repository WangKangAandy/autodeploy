# MUSA SDK Compatibility Mapping
# This file defines SDK/driver compatibility and download templates

# Metadata: defaults and download templates
metadata:
  moss_alias: sh-moss
  moss_endpoint: https://sh-moss.mthreads.com
  moss_credentials:
    access_key: sw-guest-mt-sw
    secret_key: sw-guest123
  driver_path_template: "sh-moss/sw-release/musa/external/{sdk_version}/deb/musa_{driver_version}-server_amd64.deb"

# Compatibility mapping
compatibility:
  - sdk_version: "4.3.1"
    driver_version: "3.3.1"
    gpu_type: S4000
    gpu_arch: QY2
    os: Ubuntu
    cpu: Intel
    supported_images:
      - registry.mthreads.com/public/musa-train:rc4.3.1-kuae2.1-20251014-juleng

  # Placeholder for new versions
  - sdk_version: "4.3.3"
    driver_version: ""
    gpu_type: ""
    gpu_arch: ""
    os: ""
    cpu: ""
    supported_images: []